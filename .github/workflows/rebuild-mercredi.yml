name: Rebuild mercredi

on:
  schedule:
    # Chaque mercredi à 8h00 heure de Paris (7h UTC en hiver, 6h UTC en été)
    - cron: '0 7 * * 3'
  # Permet aussi de lancer manuellement depuis l'onglet Actions sur GitHub
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le build Cloudflare Pages
        run: |
          curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
