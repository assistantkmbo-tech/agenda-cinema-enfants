backend:
  name: github
  repo: assistantkmbo-tech/agenda-cinema-enfants
  branch: main
  base_url: https://sveltia-cms-auth.assistantkmbo.workers.dev

media_folder: public/images
public_folder: /images
locale: fr

collections:

  # ─── FILMS ──────────────────────────────────────────────────────────────────
  - name: films
    label: "🎬 Films"
    label_singular: Film
    folder: src/content/films
    extension: json
    format: json
    create: true
    delete: true
    identifier_field: title
    summary: "{{title}} — {{dateLabel}}"
    view_filters:
      - label: "À l'affiche"
        field: status
        pattern: en_salle
      - label: "Bientôt"
        field: status
        pattern: bientot
      - label: "Archivés"
        field: status
        pattern: archive

    fields:
      - { label: "Titre",         name: title,      widget: string }
      - { label: "Réalisateur",   name: director,   widget: string }
      - { label: "Durée (min)",   name: duration,   widget: number, value_type: int }
      - { label: "Âge minimum",   name: ageMin,     widget: number, value_type: int, hint: "Chiffre affiché dans le rond bleu" }
      - { label: "Synopsis",      name: synopsis,   widget: text }

      - label: "Statut"
        name: status
        widget: select
        options:
          - { label: "✅ À l'affiche",  value: en_salle }
          - { label: "🔜 Bientôt",      value: bientot  }
          - { label: "📦 Archivé",      value: archive  }

      - { label: "Date de sortie", name: releaseDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false, hint: "Le mercredi de sortie — affiché automatiquement sur la carte (ex : 4 MARS) et bascule en À l'affiche après cette date" }

      - { label: "Affiche",       name: poster,     widget: image }

      - { label: "Coup de cœur", name: coupDeCoeur, widget: boolean, default: false }

      - { label: "Lien Allociné",      name: allocineUrl, widget: string, required: false }
      - { label: "Lien bande-annonce", name: trailerUrl,  widget: string, required: false }
      - { label: "Lien séances",       name: seancesUrl,  widget: string, required: false }

  # ─── RÉGLAGES ───────────────────────────────────────────────────────────────
  - name: settings
    label: "⚙️ Réglages"
    files:

      - name: ordre
        label: "🔀 Ordre des films"
        file: src/content/settings/ordre.json
        fields:
          - label: "Glisser-déposer pour réordonner"
            name: films
            widget: list
            allow_add: false
            allow_delete: false
            field: { label: Film, name: item, widget: string }

      - name: site
        label: "📝 Textes & liens"
        file: src/content/settings/site.json
        fields:
          - { label: "Titre principal",    name: introTitle,    widget: string }
          - { label: "Sous-titre",         name: introSubtitle, widget: text   }
          - { label: "URL newsletter",     name: newsletterUrl, widget: string }
          - { label: "Titre section Bientôt", name: soonTitle, widget: string }
          - { label: "Image de fond (héro)", name: heroImage, widget: image, required: false, hint: "1920×1080 — image panoramique affichée en haut du site" }
